<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --primary: #ff7b2c; --secondary: #1f2235; --bg: #f4f6fb; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { color: var(--secondary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { text-align: left; background: #f8f9fa; padding: 12px; font-size: 13px; color: #666; }
    td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
    .badge { padding: 4px 10px; border-radius: 20px; color: white; font-size: 11px; font-weight: bold; }
    .btn-view { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
    .loader { text-align: center; padding: 20px; color: var(--primary); font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Assigned Escalations 🚨</h2>
    <div id="loader" class="loader">Fetching your tickets...</div>
    <table>
      <thead>
        <tr>
          <th>Raised On</th>
          <th>Learner</th>
          <th>Issue</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ticket-list"></tbody>
    </table>
  </div>

  <script>
    const API_URL = "<?= scriptUrl ?>";

    async function fetchTickets() {
      try {
        const response = await fetch(API_URL + "?action=getTickets");
        const data = await response.json();
        
        // FILTER: Only show "Escalated" tickets on this portal
        const escalated = data.filter(t => t.status === "Escalated");
        
        const list = document.getElementById('ticket-list');
        document.getElementById('loader').style.display = 'none';
        
        if (escalated.length === 0) {
          list.innerHTML = '<tr><td colspan="5" style="text-align:center">No pending escalations found! 🎉</td></tr>';
          return;
        }

        list.innerHTML = escalated.map(t => `
          <tr>
            <td>${t.dateRaised}</td>
            <td><b>${t.name}</b></td>
            <td>${t.issue}</td>
            <td><span class="badge" style="background:#f39c12">${t.status}</span></td>
            <td><button class="btn-view" onclick='viewTicket(${JSON.stringify(t)})'>Update</button></td>
          </tr>
        `).join('');
      } catch (e) {
        alert("Error loading tickets. Please refresh.");
      }
    }

    async function viewTicket(t) {
      const { value: remark } = await Swal.fire({
        title: 'Resolve Ticket',
        html: `<div style="text-align:left">
                <p><b>Issue:</b> ${t.issue}</p>
                <p><b>Learner:</b> ${t.name}</p>
                <p><b>Original Remark:</b> ${t.remark}</p>
                <hr>
                <label><b>Resolution Remark:</b></label>
              </div>`,
        input: 'textarea',
        inputPlaceholder: 'Enter how you resolved this...',
        showCancelButton: true,
        confirmButtonColor: '#2ecc71',
        confirmButtonText: 'Mark as Solved'
      });

      if (remark) {
        Swal.fire({ title: 'Updating...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'updateTicketStatus',
            data: { row: t.row, status: 'Solved', remark: remark }
          })
        });

        Swal.fire('Success!', 'Ticket marked as solved.', 'success');
        fetchTickets();
      }
    }

    window.onload = fetchTickets;
  </script>
</body>
</html>
